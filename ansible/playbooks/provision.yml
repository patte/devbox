---
- name: Provision coding environment
  hosts: coding
  gather_facts: true
  # Connects as the dev user (ansible.cfg remote_user). On a fresh root-only host,
  # run scripts/bootstrap.sh first to create that user.
  roles:
    # Base hardening, firewall, unattended upgrades, etc.
    - role: system_setup

    # Tailscale. Optional per host: set `tailscale_enabled: false` to skip.
    - role: tailscale
      when: tailscale_enabled | default(true) | bool

    # fnm + node + pnpm, uv, gh, Claude Code, atuin, podman (+ compose), zsh + starship.
    - role: dev_tools

    # LAST: close public SSH, allow it only over the tailnet. Needs tailscale up,
    # so this must run after the tailscale role — and only when tailscale is on,
    # otherwise we'd lock ourselves out of the box entirely.
    - role: ssh_tailscale_only
      when: tailscale_enabled | default(true) | bool
