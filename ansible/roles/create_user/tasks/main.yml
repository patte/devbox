---
# Some providers (e.g. Hetzner) only give you root on a fresh box.
# This role bootstraps the unprivileged dev user so the rest of the
# playbook (and future runs) can connect as that user instead of root.
# It is skipped automatically when you are not connecting as root.
- name: Bootstrap the dev user
  become: true
  when: ansible_user | default('') == 'root'
  tags:
    - create_user
    - user
  block:
    - name: Ensure the dev user exists with sudo
      ansible.builtin.user:
        name: "{{ dev_user }}"
        shell: /bin/bash
        groups: sudo
        append: true
        create_home: true
        password: "{{ ansible_become_pass | string | password_hash('sha512') }}"
        update_password: on_create

    # Passwordless sudo for the dev user. This keeps provisioning reliable across
    # sudo and sudo-rs (Ubuntu 26.04+ ships sudo-rs, whose password prompt the
    # ansible become plugin can't detect). Fine for a single-user, key-only,
    # tailscale-fronted dev sandbox. Drop this task to require a sudo password.
    - name: Allow passwordless sudo for the dev user
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/90-devbox-{{ dev_user }}"
        mode: "0440"
        content: "{{ dev_user }} ALL=(ALL) NOPASSWD:ALL\n"
        validate: "visudo -cf %s"

    - name: Add SSH key for {{ dev_user }} from GitHub
      ansible.posix.authorized_key:
        user: "{{ dev_user }}"
        state: present
        key: https://github.com/patte.keys
        comment: "https://github.com/patte.keys"

    - name: Add additional SSH keys for {{ dev_user }}
      ansible.posix.authorized_key:
        user: "{{ dev_user }}"
        state: present
        key: "{{ item.key }}"
        comment: "{{ item.comment | default(omit) }}"
      with_items: "{{ additional_ssh_keys }}"
