---
- name: Setup tailscale
  become: true
  block:
    - name: Add Tailscale GPG key
      # apt-key is removed in modern Ubuntu (26.04+); use a keyring file instead.
      ansible.builtin.get_url:
        url: https://pkgs.tailscale.com/stable/ubuntu/focal.noarmor.gpg
        dest: /usr/share/keyrings/tailscale-archive-keyring.gpg
        mode: "0644"
        force: false

    - name: Add Tailscale APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg] https://pkgs.tailscale.com/stable/ubuntu focal main"
        state: present
        filename: tailscale

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes

    - name: Install Tailscale
      ansible.builtin.apt:
        name: tailscale
        state: present

    - name: Enable and start the server
      ansible.builtin.systemd:
        name: tailscaled
        state: started
        enabled: true
