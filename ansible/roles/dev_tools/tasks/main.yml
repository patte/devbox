---
- name: Developer tooling
  tags:
    - dev_tools
  block:
    # --- System packages -------------------------------------------------
    - name: Install base developer packages
      become: true
      ansible.builtin.apt:
        name:
          - git
          - build-essential
          - curl
          - ca-certificates
          - unzip
          - jq
          - btop
          - tmux
          - neovim
          - postgresql-client
        state: present
        update_cache: yes
      tags:
        - apt

    # --- GitHub CLI (official apt repo) ----------------------------------
    - name: Ensure apt keyrings directory exists
      become: true
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags:
        - gh

    - name: Add GitHub CLI apt signing key
      become: true
      ansible.builtin.get_url:
        url: https://cli.github.com/packages/githubcli-archive-keyring.gpg
        dest: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        mode: "0644"
      tags:
        - gh

    - name: Add GitHub CLI apt repository
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/github-cli.list
        mode: "0644"
        content: |
          deb [arch={{ 'arm64' if ansible_facts['architecture'] == 'aarch64' else 'amd64' }} signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main
      tags:
        - gh

    - name: Install GitHub CLI
      become: true
      ansible.builtin.apt:
        name: gh
        state: present
        update_cache: yes
      tags:
        - gh

    - name: Install podman and compose
      become: true
      ansible.builtin.apt:
        name:
          - podman
          - podman-compose
          - uidmap
          - slirp4netns
          - fuse-overlayfs
          - dbus-user-session
        state: present
      when: install_podman | bool
      tags:
        - podman

    # --- Per-user setup --------------------------------------------------
    - name: Resolve dev user uid
      become: true
      ansible.builtin.command: "id -u {{ dev_user }}"
      register: dev_user_uid_result
      changed_when: false

    - name: Set dev user uid fact
      ansible.builtin.set_fact:
        dev_user_uid: "{{ dev_user_uid_result.stdout }}"

    - name: Enable linger for {{ dev_user }} (rootless containers survive logout)
      become: true
      ansible.builtin.command:
        cmd: "loginctl enable-linger {{ dev_user }}"
        creates: "/var/lib/systemd/linger/{{ dev_user }}"
      when: install_podman | bool
      tags:
        - podman

    # --- fnm + node + pnpm -----------------------------------------------
    - name: Check whether fnm is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.local/bin/fnm"
      register: fnm_installed
      tags:
        - fnm

    - name: Install fnm
      become: true
      become_user: "{{ dev_user }}"
      # --install-dir ~/.local/bin: drops the fnm binary on the PATH we already
      # manage, so no extra PATH entry is needed. --skip-shell: we wire up
      # `fnm env` ourselves in the shell-init blocks below.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -fsSL https://fnm.vercel.app/install | bash -s -- --install-dir \"$HOME/.local/bin\" --skip-shell"
        executable: /bin/bash
      when: not fnm_installed.stat.exists
      tags:
        - fnm

    - name: Install Node.js via fnm + enable pnpm (corepack)
      become: true
      become_user: "{{ dev_user }}"
      # fnm `use`/`default` only accept a concrete version (not selectors like
      # --lts), and fnm install is idempotent (exit 0, printing the concrete
      # version every run + a "Version already installed" note when present). So
      # we install, parse the concrete version fnm reports, and pin it as the
      # default. pnpm ships with node via corepack, so no separate download.
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          eval "$(fnm env --shell bash)"
          out="$(fnm install {{ node_version }} 2>&1)"; echo "$out"
          ver="$(printf '%s\n' "$out" | grep -oE -m1 'v[0-9]+\.[0-9]+\.[0-9]+')"
          fnm default "$ver"
          corepack enable pnpm
        executable: /bin/bash
      register: node_install
      # "Installing Node vX" prints every run; an install only actually changed
      # something when fnm did NOT report the version as already present.
      changed_when: "'Version already installed' not in node_install.stdout"
      tags:
        - fnm
        - node
        - pnpm

    # --- uv (Python package/project manager) -----------------------------
    - name: Check whether uv is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.local/bin/uv"
      register: uv_installed
      tags:
        - uv

    - name: Install uv
      become: true
      become_user: "{{ dev_user }}"
      # Installs to ~/.local/bin (already on PATH). INSTALLER_NO_MODIFY_PATH: we
      # manage PATH ourselves, so the installer shouldn't touch the shell rc.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -LsSf https://astral.sh/uv/install.sh | sh"
        executable: /bin/bash
      environment:
        INSTALLER_NO_MODIFY_PATH: "1"
      when: not uv_installed.stat.exists
      tags:
        - uv

    # --- Claude Code (native installer) ----------------------------------
    - name: Check whether Claude Code is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.local/bin/claude"
      register: claude_installed
      when: install_claude_code | bool
      tags:
        - claude

    - name: Install Claude Code (native installer)
      become: true
      become_user: "{{ dev_user }}"
      # Recommended over npm. Installs to ~/.local/bin and self-updates, so we
      # only run it when missing.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -fsSL https://claude.ai/install.sh | bash"
        executable: /bin/bash
      when:
        - install_claude_code | bool
        - not claude_installed.stat.exists
      tags:
        - claude

    # --- pi (coding agent harness, https://pi.dev) -----------------------
    - name: Check whether pi is installed
      become: true
      become_user: "{{ dev_user }}"
      # pi installs into Node's global bin (path depends on the node version),
      # so probe via `command -v` inside `fnm env` rather than stat-ing.
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/bin:$PATH"
          eval "$(fnm env --shell bash)"
          command -v pi
        executable: /bin/bash
      register: pi_installed
      changed_when: false
      failed_when: false
      when: install_pi | bool
      tags:
        - pi

    - name: Install pi (coding agent harness)
      become: true
      become_user: "{{ dev_user }}"
      # Install the npm package directly (same thing pi.dev/install.sh ends up
      # doing) under fnm env, so it uses our managed Node and lands in Node's
      # global bin (already on PATH via `fnm env`). We skip the curl installer
      # because it draws an interactive tty menu (choose_pi_action) that blocks
      # forever under ansible's pty. --ignore-scripts (per pi's docs) avoids any
      # postinstall hooks. Gated on "missing" to keep the play idempotent.
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          eval "$(fnm env --shell bash)"
          npm install -g --ignore-scripts @earendil-works/pi-coding-agent
        executable: /bin/bash
      when:
        - install_pi | bool
        - pi_installed.rc != 0
      tags:
        - pi

    - name: Ensure pi agent config directory exists
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.file:
        path: "/home/{{ dev_user }}/.pi/agent"
        state: directory
        mode: "0700"
      when: install_pi | bool
      tags:
        - pi

    - name: Write global pi AGENTS.md (box toolchain notes)
      become: true
      become_user: "{{ dev_user }}"
      # pi concatenates ~/.pi/agent/AGENTS.md into every session, so this tells
      # the agent which tools are preinstalled and how to add more (uv, pnpm, …).
      ansible.builtin.template:
        src: pi-AGENTS.md.j2
        dest: "/home/{{ dev_user }}/.pi/agent/AGENTS.md"
        mode: "0644"
        # Keep a timestamped copy when the on-box file differs, so a hand-edited
        # AGENTS.md isn't silently clobbered by a provision run (recoverable).
        backup: true
      when: install_pi | bool
      tags:
        - pi

    - name: Warn when pi credentials are missing
      ansible.builtin.debug:
        msg: >-
          pi_api_key / pi_product_id are empty — skipping pi's models.json. Set
          them in the vault (scripts/vault.sh edit
          inventory/group_vars/all/vault.yml) to configure the Infomaniak provider.
      when:
        - install_pi | bool
        - (pi_api_key | length == 0) or (pi_product_id | length == 0)
      tags:
        - pi

    - name: Configure pi models (Infomaniak provider)
      become: true
      become_user: "{{ dev_user }}"
      # Holds the API key → 0600. Only written when pi_api_key + pi_product_id
      # are set (from the vault; empty by default).
      ansible.builtin.copy:
        dest: "/home/{{ dev_user }}/.pi/agent/models.json"
        mode: "0600"
        content: |
          {{ {
            "providers": {
              "infomaniak": {
                "baseUrl": pi_base_url,
                "api": "openai-completions",
                "apiKey": pi_api_key,
                "models": pi_models,
              },
            },
          } | to_nice_json }}
      when:
        - install_pi | bool
        - pi_api_key | length > 0
        - pi_product_id | length > 0
      tags:
        - pi

    # --- flyctl (Fly.io CLI) ---------------------------------------------
    - name: Check whether flyctl is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.local/bin/flyctl"
      register: flyctl_installed
      when: install_flyctl | bool
      tags:
        - flyctl

    - name: Install flyctl (Fly.io CLI)
      become: true
      become_user: "{{ dev_user }}"
      # FLYCTL_INSTALL=~/.local drops the binary in ~/.local/bin (already on the
      # PATH we manage), so no extra PATH entry is needed. The installer
      # self-updates via `fly version upgrade`, so we only run it when missing.
      # ($HOME doesn't expand in ansible's environment, so spell out the path.)
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -L https://fly.io/install.sh | sh"
        executable: /bin/bash
      environment:
        FLYCTL_INSTALL: "/home/{{ dev_user }}/.local"
      when:
        - install_flyctl | bool
        - not flyctl_installed.stat.exists
      tags:
        - flyctl

    # --- Cloudflare: wrangler (Workers/Pages) + cloudflared (Tunnel) -----
    - name: Check whether wrangler is installed
      become: true
      become_user: "{{ dev_user }}"
      # wrangler lives in fnm's node global bin, whose path depends on the node
      # version, so probe via `command -v` inside `fnm env` rather than stat-ing.
      ansible.builtin.shell:
        cmd: |
          export PATH="$HOME/.local/bin:$PATH"
          eval "$(fnm env --shell bash)"
          command -v wrangler
        executable: /bin/bash
      register: wrangler_installed
      changed_when: false
      failed_when: false
      when: install_wrangler | bool
      tags:
        - cloudflare
        - wrangler

    - name: Install wrangler (Cloudflare Workers/Pages CLI) via npm
      become: true
      become_user: "{{ dev_user }}"
      # Installs into fnm's node global bin (already on PATH via `fnm env`).
      # wrangler only warns about new releases (no self-update), but re-running
      # this is cheap; we still gate on "missing" to keep the play idempotent.
      ansible.builtin.shell:
        cmd: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          eval "$(fnm env --shell bash)"
          npm install -g wrangler
        executable: /bin/bash
      when:
        - install_wrangler | bool
        - wrangler_installed.rc != 0
      tags:
        - cloudflare
        - wrangler

    - name: Add Cloudflare apt signing key
      become: true
      # Already a binary keyring (the official docs pipe it straight to disk).
      ansible.builtin.get_url:
        url: https://pkg.cloudflare.com/cloudflare-main.gpg
        dest: /usr/share/keyrings/cloudflare-main.gpg
        mode: "0644"
      when: install_cloudflared | bool
      tags:
        - cloudflare
        - cloudflared

    - name: Restrict Cloudflare apt repo to cloudflared only
      become: true
      # Defence-in-depth: pin everything from
      # pkg.cloudflare.com to a negative priority and re-allow only the exact
      # cloudflared package, so the repo can never introduce or override
      # anything else on the system.
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/cloudflared.pref
        mode: "0644"
        content: |
          Package: *
          Pin: origin "pkg.cloudflare.com"
          Pin-Priority: -10

          Package: cloudflared
          Pin: origin "pkg.cloudflare.com"
          Pin-Priority: 500
      when: install_cloudflared | bool
      tags:
        - cloudflare
        - cloudflared

    - name: Add Cloudflare apt repository
      become: true
      # `any main` is distro-agnostic (no codename), so it works on releases the
      # codename-specific components don't list yet (e.g. Ubuntu 26.04).
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/cloudflared.list
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main
      when: install_cloudflared | bool
      tags:
        - cloudflare
        - cloudflared

    - name: Install cloudflared (Cloudflare Tunnel)
      become: true
      ansible.builtin.apt:
        name: cloudflared
        state: present
        update_cache: yes
      when: install_cloudflared | bool
      tags:
        - cloudflare
        - cloudflared

    # --- Google Cloud CLI (gcloud) via official apt repo ----------------
    - name: Add Google Cloud apt signing key
      become: true
      # apt-key.gpg is ASCII-armored, and apt's signed-by rejects armored keys
      # ("unsupported filetype"), so dearmor it to a binary keyring (gpg ships
      # with Ubuntu). `creates` keeps this idempotent.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg"
        executable: /bin/bash
        creates: /usr/share/keyrings/cloud.google.gpg
      when: install_gcloud | bool
      tags:
        - gcloud

    - name: Restrict Google Cloud apt repo to Google's own packages
      become: true
      # Defence-in-depth: allow only Google-namespaced packages (google-cloud-cli
      # core + its official component packages, plus the legacy google-cloud-sdk*
      # names) and pin everything else from the archive to a negative priority
      # (= never install). The repo therefore can't introduce or override any
      # package that isn't named google-* (e.g. it can't ship its own openssl).
      # Order matters: with glob pins the first matching stanza wins, so the
      # google-* allow must come before the catch-all deny.
      ansible.builtin.copy:
        dest: /etc/apt/preferences.d/google-cloud-cli.pref
        mode: "0644"
        content: |
          Package: google-*
          Pin: origin "packages.cloud.google.com"
          Pin-Priority: 500

          Package: *
          Pin: origin "packages.cloud.google.com"
          Pin-Priority: -10
      when: install_gcloud | bool
      tags:
        - gcloud

    - name: Add Google Cloud apt repository
      become: true
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/google-cloud-sdk.list
        mode: "0644"
        content: |
          deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main
      when: install_gcloud | bool
      tags:
        - gcloud

    - name: Install Google Cloud CLI (gcloud)
      become: true
      ansible.builtin.apt:
        name: google-cloud-cli
        state: present
        update_cache: yes
      when: install_gcloud | bool
      tags:
        - gcloud

    # --- atuin -----------------------------------------------------------
    - name: Check whether atuin is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.atuin/bin/atuin"
      register: atuin_installed
      tags:
        - atuin

    - name: Install atuin
      become: true
      become_user: "{{ dev_user }}"
      # --non-interactive: ansible's become pty makes /dev/tty openable, so the
      # installer would otherwise prompt (sync/import) and block forever.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl --proto '=https' --tlsv1.2 -LsSf https://setup.atuin.sh | sh -s -- --non-interactive"
        executable: /bin/bash
      when: not atuin_installed.stat.exists
      tags:
        - atuin

    # --- Git identity ----------------------------------------------------
    # Set name/email in the dev user's global ~/.gitconfig so `git commit`
    # works immediately (no "Author identity unknown / please tell me who you
    # are" prompt). Idempotent: git_config only writes when the value differs.
    - name: Configure git identity for {{ dev_user }}
      become: true
      become_user: "{{ dev_user }}"
      community.general.git_config:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        scope: global
      loop:
        - { name: "user.name", value: "{{ git_user_name }}" }
        - { name: "user.email", value: "{{ git_user_email }}" }
      when:
        - git_user_name | length > 0
        - git_user_email | length > 0
      tags:
        - git

    # --- Shell init ------------------------------------------------------
    # Two blocks: the PATH/fnm block goes at the TOP of .bashrc, before Ubuntu's
    # `case $- in *i*) ;; *) return` guard, so node/npm/pnpm/claude/atuin are
    # available to non-interactive shells too (e.g. `ssh host 'node ...'`).
    # atuin's shell hooks only make sense interactively, so they stay at the
    # bottom (guarded).
    - name: Put fnm + tool PATH at the top of .bashrc (works non-interactively)
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.blockinfile:
        path: "/home/{{ dev_user }}/.bashrc"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED: dev-tools path"
        insertbefore: BOF
        block: |
          export PATH="$HOME/.local/bin:$HOME/.atuin/bin:$PATH"
          command -v fnm >/dev/null 2>&1 && eval "$(fnm env --shell bash)"
          [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"
          export PGHOST=127.0.0.1
          export PGUSER=postgres

    - name: Configure interactive bash hooks (atuin + starship)
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.blockinfile:
        path: "/home/{{ dev_user }}/.bashrc"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED: dev-tools interactive"
        block: |
          if [[ $- == *i* ]]; then
            command -v atuin    >/dev/null 2>&1 && eval "$(atuin init bash)"
            command -v starship >/dev/null 2>&1 && eval "$(starship init bash)"
          fi
          alias gis='git status'
          alias gif='git difftool'
          alias gil='git log --decorate'
          alias grep='grep --color=auto'
          alias vi='nvim'
      tags:
        - shell

    # --- zsh + starship --------------------------------------------------
    - name: Install zsh
      become: true
      ansible.builtin.apt:
        name: zsh
        state: present
      when: install_zsh | bool
      tags:
        - zsh

    - name: Install starship prompt
      become: true
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl -fsSL https://starship.rs/install.sh | sh -s -- --yes"
        executable: /bin/bash
        creates: /usr/local/bin/starship
      when: install_zsh | bool
      tags:
        - zsh
        - starship

    - name: Make zsh the dev user's login shell
      become: true
      ansible.builtin.user:
        name: "{{ dev_user }}"
        shell: /usr/bin/zsh
      when: install_zsh | bool
      tags:
        - zsh

    - name: Configure ~/.zshenv (PATH/fnm — sourced for all zsh invocations)
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.blockinfile:
        path: "/home/{{ dev_user }}/.zshenv"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED: dev-tools path"
        block: |
          export PATH="$HOME/.local/bin:$HOME/.atuin/bin:$PATH"
          command -v fnm >/dev/null 2>&1 && eval "$(fnm env --shell zsh)"
          [ -f "$HOME/.cargo/env" ] && . "$HOME/.cargo/env"
          export PGHOST=127.0.0.1
          export PGUSER=postgres
      when: install_zsh | bool
      tags:
        - zsh

    - name: "Configure ~/.zshrc (interactive: starship + atuin)"
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.blockinfile:
        path: "/home/{{ dev_user }}/.zshrc"
        create: true
        mode: "0644"
        marker: "# {mark} ANSIBLE MANAGED: dev-tools interactive"
        block: |
          command -v starship >/dev/null 2>&1 && eval "$(starship init zsh)"
          command -v atuin    >/dev/null 2>&1 && eval "$(atuin init zsh)"
          alias gis='git status'
          alias gif='git difftool'
          alias gil='git log --decorate'
          alias grep='grep --color=auto'
          alias vi='nvim'
      when: install_zsh | bool
      tags:
        - zsh

    # --- tmux config -----------------------------------------------------
    - name: Install tmux config from dotfiles (non-fatal if unreachable)
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/patte/dotfiles/master/.tmux.conf
        dest: "/home/{{ dev_user }}/.tmux.conf"
        mode: "0644"
        force: true
      register: tmux_conf
      failed_when: false
      tags:
        - tmux

    # --- Rust ------------------------------------------------------------
    - name: Check whether rustup is installed
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.stat:
        path: "/home/{{ dev_user }}/.cargo/bin/rustup"
      register: rustup_installed
      when: install_rust | bool
      tags:
        - rust

    - name: Install rustup + stable toolchain
      become: true
      become_user: "{{ dev_user }}"
      # --no-modify-path: we manage PATH ourselves (see the shell-init blocks),
      # so rustup shouldn't edit the shell rc files.
      ansible.builtin.shell:
        cmd: "set -o pipefail; curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path --default-toolchain stable"
        executable: /bin/bash
      when:
        - install_rust | bool
        - not rustup_installed.stat.exists
      tags:
        - rust

    - name: Update Rust stable to the latest
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.command:
        cmd: "/home/{{ dev_user }}/.cargo/bin/rustup update stable"
      register: rustup_update
      changed_when: "'updated' in rustup_update.stdout or 'installed' in rustup_update.stdout"
      when: install_rust | bool
      tags:
        - rust

    # --- Rootless podman socket -----------------------------------------
    - name: Enable rootless podman socket for {{ dev_user }}
      become: true
      become_user: "{{ dev_user }}"
      ansible.builtin.systemd:
        name: podman.socket
        enabled: true
        state: started
        scope: user
      environment:
        XDG_RUNTIME_DIR: "/run/user/{{ dev_user_uid }}"
      when: install_podman | bool
      register: podman_socket
      failed_when: false
      tags:
        - podman
