---
# nvm release tag to install (https://github.com/nvm-sh/nvm/releases).
nvm_version: "v0.40.1"

# Node version for `nvm install` / `nvm alias default` (e.g. "lts/*", "22", "20.11.0").
node_version: "lts/*"

# Claude Code (installed globally via the nvm-managed npm).
install_claude_code: true
claude_code_package: "@anthropic-ai/claude-code"

# Container tooling.
install_podman: true

# zsh + starship prompt (no plugin framework). zsh becomes the dev user's shell.
install_zsh: true
