---
# Git identity written to the dev user's global ~/.gitconfig, so `git commit`
# works out of the box without the "Author identity unknown" error.
git_user_name: "patte"
git_user_email: "p@tte.io"

# Node version selector passed to fnm (https://github.com/Schniz/fnm).
# Examples: "--lts" (latest LTS), "22", "20.11.0", "lts/hydrogen".
node_version: "--lts"

# Claude Code, via the recommended native installer (installs to ~/.local/bin
install_claude_code: true

# Fly.io CLI (flyctl), via the official installer (installs to ~/.local/bin).
install_flyctl: true

# Cloudflare Workers/Pages CLI (wrangler), installed globally via npm (needs node).
install_wrangler: true

# Cloudflare Tunnel daemon/CLI (cloudflared), via the official apt repo.
install_cloudflared: true

# Google Cloud CLI (gcloud), via the official apt repo.
install_gcloud: true

# Container tooling.
install_podman: true

# zsh + starship prompt (no plugin framework). zsh becomes the dev user's shell.
install_zsh: true

# Rust toolchain via rustup (latest stable).
install_rust: true

# pi coding agent harness (https://pi.dev), installed as an npm global under
# fnm's Node (the curl installer's tty menu blocks under ansible).
install_pi: true

# pi extension packages to install (via `pi install <name>`). Loaded into
# every pi session once installed; a restart is needed to pick them up (we just
# install, the next `pi` launch loads them). Entries can be npm refs
# (`npm:<name>`) or pi.dev registry packages bare names,
pi_packages:
  - "npm:@juicesharp/rpiv-ask-user-question"
  - "npm:pi-web-access"

# Infomaniak AI Tools (OpenAI-compatible) credentials for pi. The real values
# live in the ansible vault (inventory/group_vars/all/vault.yml), which overrides
# these empty fallbacks. If either is empty, pi's models.json is not written.
pi_api_key: ""
pi_product_id: ""

# Infomaniak's OpenAI-compatible base URL — the product id is part of the path.
pi_base_url: "https://api.infomaniak.com/2/ai/{{ pi_product_id }}/openai/v1"

# Models exposed to pi under the "infomaniak" provider. `id` is Infomaniak's
# model identifier (as returned by GET /2/ai/{product_id}/openai/v1/models);
# tune contextWindow/maxTokens here as the models' limits change.
pi_models:
  - { id: "moonshotai/Kimi-K2.6", name: "Kimi K2.6", contextWindow: 131072 }
  - { id: "Qwen/Qwen3.5-397B-A17B-FP8", name: "Qwen3.5 397B A17B", contextWindow: 131072 }
  - { id: "mistralai/Mistral-Small-4-119B-2603", name: "Mistral Small 4 119B", contextWindow: 131072 }
